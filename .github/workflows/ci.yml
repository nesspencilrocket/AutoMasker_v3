name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    name: Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install minimal test dependencies
        run: |
          python -m pip install --upgrade pip
          # 本体の requirements は torch/CUDA 依存で CI では重すぎるので、
          # 非ML部分のテストに必要な最小セットだけ入れる
          pip install numpy 'opencv-python-headless>=4.9' plyfile

      - name: Run smoke tests (I/O, refinement)
        run: python tests/test_smoke.py

      - name: Run mask-lift tests (projection, solver)
        run: python tests/test_mask_lift.py

      - name: Run panorama tests (ERP <-> perspective)
        run: python tests/test_pano.py

  security:
    name: Security scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install scanners
        run: pip install bandit pip-audit

      - name: Run bandit (medium+)
        run: |
          bandit -r automasker/ export/ scripts/ \
            --severity-level medium \
            --confidence-level medium \
            -f txt

      - name: Audit dependencies for CVEs
        run: pip-audit -r requirements.txt

  lint:
    name: Syntax & formatting check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Check every Python file parses
        run: |
          python - <<'EOF'
          import ast, sys
          from pathlib import Path
          ok = True
          for p in Path('.').rglob('*.py'):
              if '__pycache__' in str(p):
                  continue
              try:
                  ast.parse(p.read_text())
              except SyntaxError as e:
                  print(f'  FAIL {p}: {e}')
                  ok = False
          sys.exit(0 if ok else 1)
          EOF
